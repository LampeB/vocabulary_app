name: E2E (emulator)

# Runs the Patrol quiz suite on an Android emulator on GitHub's cloud runners —
# no local machine or phone needed. Manual trigger; dispatch against any branch.
#
# Requires repo secrets: SUPABASE_URL, SUPABASE_ANON_KEY, TEST_EMAIL, TEST_PASSWORD.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    # 18 E2E scenarios. Each Patrol UI action on the animating study screens costs
    # ~10s (waitUntilVisible polls until the target clears the animations), so the
    # full suite runs long. 60 min covers emulator boot (~10-16 min) + the suite.
    # Faster options if needed: shard into a matrix, or make the study animations
    # respect MediaQuery.disableAnimations so actions settle instantly.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Patrol CLI. If this version mismatches the `patrol` package (4.6.x), pin
      # it here to the compatible release.
      - run: dart pub global activate patrol_cli

      - name: Write build-time config (.env.json)
        run: |
          cat > .env.json <<EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "REVENUECAT_API_KEY": "YOUR_REVENUECAT_KEY",
            "SIMULATE_SPEECH": "correct",
            "TEST_LOCALE": "fr",
            "TEST_MODE": "true",
            "TEST_CARD_LIMIT": "3",
            "TEST_EMAIL": "${{ secrets.TEST_EMAIL }}",
            "TEST_PASSWORD": "${{ secrets.TEST_PASSWORD }}"
          }
          EOF

      - name: Reset test account data (server-side, pre-run)
        # Wipes the test user's vocabulary lists on Supabase so rows left by a
        # previous run don't sync down into the fresh emulator and pre-fill the
        # free-plan list quota. Deleting a list cascades to its concepts →
        # word_variants → variant_progress (FK ON DELETE CASCADE). Uses ONLY the
        # existing secrets — no service-role key: we sign in as the test user and
        # rely on RLS (policy lists_owner: owner_id = auth.uid()) to scope it.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          set -euo pipefail
          payload=$(jq -nc --arg e "$TEST_EMAIL" --arg p "$TEST_PASSWORD" \
            '{email:$e,password:$p}')
          resp=$(curl -sS -X POST \
            "$SUPABASE_URL/auth/v1/token?grant_type=password" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")
          token=$(echo "$resp" | jq -r '.access_token // empty')
          uid=$(echo "$resp" | jq -r '.user.id // empty')
          if [ -z "$token" ] || [ -z "$uid" ]; then
            echo "::error::Supabase sign-in failed for the test account"
            echo "$resp"
            exit 1
          fi
          echo "Deleting vocabulary_lists for test user $uid …"
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X DELETE "$SUPABASE_URL/rest/v1/vocabulary_lists?owner_id=eq.$uid" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $token" \
            -H "Prefer: return=minimal")
          echo "DELETE vocabulary_lists -> HTTP $code"
          case "$code" in
            2*) echo "Test account lists cleared." ;;
            *)  echo "::error::cleanup delete failed (HTTP $code)"; exit 1 ;;
          esac

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Patrol E2E on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          ram-size: 4096M
          disable-animations: true
          # TEMP DIAGNOSTIC: run navigation_test directly with logcat capture to
          # get the real crash stack trace. Restore the quiz retry line after.
          script: "adb logcat -c; adb logcat -v threadtime > /tmp/lc.txt 2>&1 & LCPID=$!; patrol test --target patrol_test/navigation_test.dart --dart-define-from-file=.env.json; code=$?; sleep 3; kill $LCPID 2>/dev/null; echo '===== LOGCAT TAIL ====='; grep -iaE 'flutter|AndroidRuntime|FATAL|E/|Exception|assert|Scaffold|RenderObject' /tmp/lc.txt | tail -300; exit $code"
