name: E2E (emulator)

# Runs the Patrol quiz suite on an Android emulator on GitHub's cloud runners —
# no local machine or phone needed. Manual trigger; dispatch against any branch.
#
# Requires repo secrets: SUPABASE_URL, SUPABASE_ANON_KEY, TEST_EMAIL, TEST_PASSWORD.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Expected ~22 min, but emulator boot+build varies (11-16 min observed). Cap
    # at 40 so a slow boot + all 7 scenarios still fits, while a true hang is
    # bounded (the per-test timeouts + monitor catch it sooner).
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Patrol CLI. If this version mismatches the `patrol` package (4.6.x), pin
      # it here to the compatible release.
      - run: dart pub global activate patrol_cli

      - name: Write build-time config (.env.json)
        run: |
          cat > .env.json <<EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "REVENUECAT_API_KEY": "YOUR_REVENUECAT_KEY",
            "SIMULATE_SPEECH": "correct",
            "TEST_LOCALE": "fr",
            "TEST_MODE": "true",
            "TEST_CARD_LIMIT": "5",
            "TEST_EMAIL": "${{ secrets.TEST_EMAIL }}",
            "TEST_PASSWORD": "${{ secrets.TEST_PASSWORD }}"
          }
          EOF

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Patrol E2E on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          ram-size: 4096M
          disable-animations: true
          # Capture device logcat so a native crash / app restart between tests
          # (which leaves no Dart output) is diagnosable. Enlarge the ring buffer
          # and dump ONCE at the end — streaming it in the background contends
          # with Patrol's own adb channel and hangs the tests.
          script: |
            adb logcat -c || true
            adb logcat -G 16M || true
            set +e
            patrol test \
              --target patrol_test/quiz_all_test.dart \
              --dart-define-from-file=.env.json
            RC=$?
            adb logcat -d > "$GITHUB_WORKSPACE/logcat.txt" 2>&1 || true
            exit $RC

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat
          path: logcat.txt
          if-no-files-found: warn
