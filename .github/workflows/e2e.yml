name: E2E (emulator)

# Runs the Patrol quiz suite on an Android emulator on GitHub's cloud runners —
# no local machine or phone needed. Manual trigger; dispatch against any branch.
#
# Requires repo secrets: SUPABASE_URL, SUPABASE_ANON_KEY, TEST_EMAIL, TEST_PASSWORD.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    # clearPackageData isolates each test (fresh process + sign-in), so there's no
    # cross-test accumulation — but a single fresh sign-in/launch occasionally
    # deadlocks. Each attempt is hard-capped with `timeout` so a hang is killed and
    # RETRIED rather than eating the whole budget. 60 min fits boot + 2 attempts.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # Patrol CLI. If this version mismatches the `patrol` package (4.6.x), pin
      # it here to the compatible release.
      - run: dart pub global activate patrol_cli

      - name: Write build-time config (.env.json)
        run: |
          cat > .env.json <<EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "REVENUECAT_API_KEY": "YOUR_REVENUECAT_KEY",
            "SIMULATE_SPEECH": "correct",
            "TEST_LOCALE": "fr",
            "TEST_MODE": "true",
            "TEST_CARD_LIMIT": "3",
            "TEST_EMAIL": "${{ secrets.TEST_EMAIL }}",
            "TEST_PASSWORD": "${{ secrets.TEST_PASSWORD }}"
          }
          EOF

      - name: Reset test account data (server-side, pre-run)
        # Wipes the test user's vocabulary lists on Supabase so rows left by a
        # previous run don't sync down into the fresh emulator and pre-fill the
        # free-plan list quota. Deleting a list cascades to its concepts →
        # word_variants → variant_progress (FK ON DELETE CASCADE). Uses ONLY the
        # existing secrets — no service-role key: we sign in as the test user and
        # rely on RLS (policy lists_owner: owner_id = auth.uid()) to scope it.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          set -euo pipefail
          payload=$(jq -nc --arg e "$TEST_EMAIL" --arg p "$TEST_PASSWORD" \
            '{email:$e,password:$p}')
          resp=$(curl -sS -X POST \
            "$SUPABASE_URL/auth/v1/token?grant_type=password" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload")
          token=$(echo "$resp" | jq -r '.access_token // empty')
          uid=$(echo "$resp" | jq -r '.user.id // empty')
          if [ -z "$token" ] || [ -z "$uid" ]; then
            echo "::error::Supabase sign-in failed for the test account"
            echo "$resp"
            exit 1
          fi
          # Seed the fresh session (as a JSON string) into .env.json so the app
          # restores it under TEST_MODE and every isolated test starts signed in
          # (no slow, flaky per-test UI sign-in). recoverSession() parses this.
          jq --argjson s "$resp" '. + {TEST_SESSION: ($s | tostring)}' \
            .env.json > .env.json.tmp && mv .env.json.tmp .env.json
          echo "Seeded TEST_SESSION into .env.json."
          echo "Deleting vocabulary_lists for test user $uid …"
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X DELETE "$SUPABASE_URL/rest/v1/vocabulary_lists?owner_id=eq.$uid" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $token" \
            -H "Prefer: return=minimal")
          echo "DELETE vocabulary_lists -> HTTP $code"
          case "$code" in
            2*) echo "Test account lists cleared." ;;
            *)  echo "::error::cleanup delete failed (HTTP $code)"; exit 1 ;;
          esac

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Patrol E2E on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          ram-size: 4096M
          disable-animations: true
          # Each attempt is hard-capped at 23 min: a clean run is ~22 min, so a
          # hung attempt is killed at 23 min and the next attempt runs (a single
          # deadlocked sign-in no longer eats the whole job).
          script: "for attempt in 1 2 3; do echo \"=== attempt $attempt/3 ===\"; timeout 23m patrol test --target patrol_test/quiz_all_test.dart --dart-define-from-file=.env.json && exit 0; done; exit 1"
