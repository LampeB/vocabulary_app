name: Build APK

# Manual trigger only — run it from the Actions tab once the two secrets below
# are set (Settings → Secrets and variables → Actions):
#   SUPABASE_URL        e.g. https://<project>.supabase.co
#   SUPABASE_ANON_KEY   the project's anon/publishable key
# RevenueCat is left as a placeholder (not set up yet).
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write build-time secrets to .env.json
        run: |
          cat > .env.json <<EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "REVENUECAT_API_KEY": "YOUR_REVENUECAT_KEY"
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --dart-define-from-file=.env.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vocabkr-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
