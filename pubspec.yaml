name: vocab_kr
description: French ↔ Korean vocabulary learning app with spaced repetition, voice quiz, and social features.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local database (type-safe SQLite ORM)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.30
  path: ^1.9.0
  path_provider: ^2.1.5

  # Remote backend + auth
  supabase_flutter: ^2.8.4

  # Payments
  purchases_flutter: ^8.4.0

  # Audio
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.0
  record: ^5.2.0

  # Speech
  speech_to_text: ^7.3.0

  # HTTP + crypto
  http: ^1.2.2
  crypto: ^3.0.6

  # String fuzzy matching
  string_similarity: ^2.0.0

  # Prefs + UUIDs
  shared_preferences: ^2.3.5
  uuid: ^4.5.1

  # Images
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Sharing + file I/O
  share_plus: ^10.1.4
  file_picker: ^8.1.7

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Connectivity
  connectivity_plus: ^6.1.3

  # Animations
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: '>=2.4.14 <3.0.0'
  freezed: ^2.5.7
  json_serializable: ^6.9.3
  riverpod_generator: ^2.6.1
  drift_dev: ^2.22.1
  analyzer_plugin: ^0.13.4


flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/animations/
